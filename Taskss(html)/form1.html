<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/SignUp</title>
    <link rel="stylesheet" href="form1.css">
</head>
<body>
    <div class="container">
        <div class="login">
            <form>
                <h1>Login</h1><br>
                <input type="text" placeholder="Email" id="email"><br>
                <input type="password" placeholder="Password" id="password"><br>
                <a href="#">Forgot Password?</a><br>
                <button id="bt_login">Login</button><br>
                <p>Don't have an account?<a href="#">Signup</a></p><br>
                <hr><br>
                <button id="bt_fblogin">Login with Facebook</button><br>
                <button id="bt_googlelogin">Login with Google</button><br>
            </form>
        </div>
        <div class="signup">
            <form>
                <h1>Signup</h1><br>
                <input type="text" placeholder="Email" id="email"><br>
                <input type="password" placeholder="Create password" id="password"><br>
                <input type="password" placeholder="Confirm password" id="confirmpassword"><br>
                <button id="bt_signup">SignUp</button><br>
                <p>Already have an account?<a href="#">Login</a></p><br>
                <hr><br>
                <button id="bt_fblogin">Login with Facebook</button><br>
                <button id="bt_googlelogin">Login with Google</button><br>
            </form>
        </div>
    </div>
</body>
</html>

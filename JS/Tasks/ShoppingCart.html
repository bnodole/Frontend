<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
        }
        .container{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }
        .cartBox{
            height: 270px;
            width: 300px;
            border: 1px solid grey;
            border-radius: 10px;
            box-shadow: 1px 1px 10px rgb(70, 69, 69); 
            display: flex;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }
        .btn_container{
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        button{
            height: 35px;
            width: 35px;
            background-color: black;
            color: white;
        }
        span{
            font-size: 30px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="cartBox">
            <h1>Shopping Cart</h1>
            <span id="haha">0</span>
            <br>
            <div class="btn_container">
                <button id="plus">+</button>
                <button id="minus">-</button>
            </div>
        </div>
    </div>
    <script src="shop.js"></script>
</body>
</html>

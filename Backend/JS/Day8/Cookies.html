<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" name="userName" id="username"><br>
        <input type="text" name="email" id="email"><br>
        <input type="submit" value="Add" id="btn_add">
        <input type="submit" value="SecondAdd" id="btn_sadd">
    </form>
    <script>
        function setCookie(cname, cvalue, expDays){
            let date = new Date();
            date.setTime(date.getTime()+ expDays * 24*60*60*1000);
            let expDate ="Expires=" + date.toUTCString();
            document.cookie = cname + "=" + cvalue + ";" + expDate;
        }


        document.getElementById("btn_add").addEventListener("click",(e)=>{
            e.preventDefault();
            const userName = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            let expDays = 7;
            setCookie("student",JSON.stringify({userName,email}),expDays);
        });
        document.getElementById("btn_sadd").addEventListener("click",(e)=>{
            e.preventDefault();
            const userName = document.getElementById("username").value;
            const email = document.getElementById("email").value;
            let expDays = 7;
            setCookie("student2",JSON.stringify({userName,email}),expDays);
        });
    </script>
</body>
</html>

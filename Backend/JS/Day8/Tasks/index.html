<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards</title>
    <style>
        #cardHolder{
            border: 1px solid #000000;
            display: grid;
            grid-template-columns: repeat(5,1fr);
            gap: 10px;
        }
        .card{
            border: 1px solid black;
            height: 250px;
            width: 250px;
            padding: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .view{
            height: 40px;
            width: 90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="cardHolder">

        </div>
    </div>
    <script src="books.js"></script>
</body>
</html>
